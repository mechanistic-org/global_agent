<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post 3: Wiring the Limit Switch</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { fill: #161b22; stroke: #30363d; stroke-width: 2px; rx: 8; }
        .node rect { stroke-width: 2px; rx: 6; }
        .node text { font-size: 14px; fill: #ffffff; font-weight: bold; text-anchor: middle; font-family: monospace; }
        .link { fill: none; stroke-width: 2px; }
        .link-webhook { stroke: #a371f7; stroke-width: 3px; marker-end: url(#arrow-purple); }
        .link-danger { stroke: #f85149; stroke-width: 3px; stroke-dasharray: 4,4; marker-end: url(#arrow-red); }
        .link-safe { stroke: #3fb950; stroke-width: 3px; marker-end: url(#arrow-green); }
    </style>
</head>
<body>
    <svg width="700" height="500">
        <defs>
            <marker id="arrow-purple" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,-5L10,0L0,5" fill="#a371f7" /></marker>
            <marker id="arrow-red" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,-5L10,0L0,5" fill="#f85149" /></marker>
            <marker id="arrow-green" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,-5L10,0L0,5" fill="#3fb950" /></marker>
        </defs>
    </svg>
    <script>
        const svg = d3.select("svg");

        // Bounding Box
        svg.append("rect").attr("class", "box").attr("x", 50).attr("y", 50).attr("width", 600).attr("height", 400);

        const nodes = [
            {id: "Webhook", x: 100, y: 100, w: 180, h: 45, color: "#a371f7", fill: "#3c1e70", label: "GitHub Webhook"},
            {id: "Node0", x: 100, y: 220, w: 180, h: 45, color: "#58a6ff", fill: "#1f3a5f", label: "Node 0 (Router)"},
            {id: "Cage", x: 100, y: 340, w: 180, h: 45, color: "#3fb950", fill: "#194a20", label: "[ CIRCUIT BREAKER ]"},
            
            // The 17-Agent Cascade (Danger)
            {id: "Cascade", x: 400, y: 150, w: 220, h: 45, color: "#f85149", fill: "#3b1d1e", label: "17-Agent VRAM Cascade"},
            {id: "RAM", x: 400, y: 220, w: 220, h: 45, color: "#f85149", fill: "#3b1d1e", label: "128GB RAM Exhaustion"},
            {id: "API", x: 400, y: 290, w: 220, h: 45, color: "#f85149", fill: "#3b1d1e", label: "API Quota Terminated"}
        ];

        const links = [
            {x1: 190, y1: 145, x2: 190, y2: 220, class: "link-webhook"}, // Webhook to Node0
            {x1: 190, y1: 265, x2: 190, y2: 340, class: "link-safe"},    // Node0 to Cage (Safe route)
            
            // Danger routes
            {x1: 280, y1: 230, x2: 400, y2: 170, class: "link-danger"},
            {x1: 280, y1: 242, x2: 400, y2: 242, class: "link-danger"},
            {x1: 280, y1: 255, x2: 400, y2: 312, class: "link-danger"}
        ];

        svg.selectAll(".link")
            .data(links).enter().append("line")
            .attr("class", d => d.class ? `link ${d.class}` : "link")
            .attr("x1", d => d.x1).attr("y1", d => d.y1)
            .attr("x2", d => d.x2).attr("y2", d => d.y2);

        const node = svg.selectAll(".node")
            .data(nodes).enter().append("g")
            .attr("class", "node")
            .attr("transform", d => `translate(${d.x},${d.y})`);

        node.append("rect")
            .attr("width", d => d.w).attr("height", d => d.h)
            .style("fill", d => d.fill).style("stroke", d => d.color);

        node.append("text").attr("dx", d => d.w / 2).attr("dy", d => d.h / 2 + 5).text(d => d.label);
    </script>
</body>
</html>
