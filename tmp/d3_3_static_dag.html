<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3 #3: X-Ray DAG</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { fill: #161b22; stroke: #30363d; stroke-width: 2px; rx: 8; }
        .node rect { stroke-width: 2px; rx: 6; }
        .node text { font-size: 14px; fill: #ffffff; font-weight: bold; text-anchor: middle; font-family: monospace; }
        .link { fill: none; stroke: #8b949e; stroke-width: 2px; marker-end: url(#arrow); }
        .human-link { stroke: #ff7b72; stroke-width: 3px; stroke-dasharray: 4,4; }
    </style>
</head>
<body>
    <svg width="600" height="700">
        <defs>
            <marker id="arrow" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,-5L10,0L0,5" fill="#8b949e" />
            </marker>
        </defs>
    </svg>
    <script>
        const svg = d3.select("svg");
        
        // Sandbox Container Box
        svg.append("rect").attr("class", "box").attr("x", 150).attr("y", 200).attr("width", 300).attr("height", 250);
        svg.append("text").attr("x", 300).attr("y", 230).attr("fill", "#8b949e").attr("text-anchor", "middle").style("font-family", "monospace").text("EN-OS EPHEMERAL SANDBOX");

        const nodes = [
            {id: "Human", x: 220, y: 50, w: 160, h: 50, color: "#ff7b72", fill: "#3b1d1e", label: "[ MANUAL TRIGGER ]"},
            {id: "Spindle", x: 220, y: 260, w: 160, h: 40, color: "#58a6ff", fill: "#1f3a5f", label: "The Spindle"},
            {id: "Jigs", x: 220, y: 360, w: 160, h: 40, color: "#58a6ff", fill: "#1f3a5f", label: "The Jigs"},
            {id: "Sensor", x: 400, y: 310, w: 100, h: 40, color: "#d2a8ff", fill: "#442a66", label: "Sensor"},
            {id: "Substrate", x: 200, y: 550, w: 200, h: 60, color: "#3fb950", fill: "#194a20", label: "GitHub Substrate"}
        ];

        const links = [
            {x1: 300, y1: 100, x2: 300, y2: 250, class: "human-link"},
            {x1: 300, y1: 300, x2: 300, y2: 350},
            {x1: 300, y1: 400, x2: 300, y2: 540},
            {x1: 450, y1: 350, x2: 400, y2: 540},
            {x1: 380, y1: 280, x2: 450, y2: 300}
        ];

        svg.selectAll(".link")
            .data(links)
            .enter().append("line")
            .attr("class", d => d.class ? `link ${d.class}` : "link")
            .attr("x1", d => d.x1).attr("y1", d => d.y1)
            .attr("x2", d => d.x2).attr("y2", d => d.y2);

        const node = svg.selectAll(".node")
            .data(nodes)
            .enter().append("g")
            .attr("class", "node")
            .attr("transform", d => `translate(${d.x},${d.y})`);

        node.append("rect")
            .attr("width", d => d.w)
            .attr("height", d => d.h)
            .style("fill", d => d.fill)
            .style("stroke", d => d.color);

        node.append("text")
            .attr("dx", d => d.w / 2)
            .attr("dy", d => d.h / 2 + 5)
            .text(d => d.label);
    </script>
</body>
</html>
