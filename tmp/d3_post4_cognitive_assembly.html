<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post 4: The Cognitive Assembly Line</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .node rect { stroke-width: 2px; rx: 6; }
        .node text { font-size: 13px; fill: #ffffff; font-weight: bold; text-anchor: middle; font-family: monospace; }
        .link { fill: none; stroke: #a371f7; stroke-width: 3px; marker-end: url(#arrow-purple); }
    </style>
</head>
<body>
    <svg width="800" height="300">
        <defs>
            <marker id="arrow-purple" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,-5L10,0L0,5" fill="#a371f7" /></marker>
        </defs>
    </svg>
    <script>
        const svg = d3.select("svg");

        const nodes = [
            {id: "Raw", x: 50, y: 120, w: 160, h: 60, color: "#8b949e", fill: "#21262d", label: "misc_PRD_working.txt\n(459g, 10 CAD loops)"},
            {id: "Jig", x: 270, y: 120, w: 160, h: 60, color: "#58a6ff", fill: "#1f3a5f", label: "Formatting Jig\n[ Administrative ]"},
            {id: "Research", x: 490, y: 120, w: 160, h: 60, color: "#d2a8ff", fill: "#442a66", label: "NSF Elaborator\n[ Deep Research ]"},
            {id: "Output", x: 710, y: 120, w: 140, h: 60, color: "#3fb950", fill: "#194a20", label: "V5 PRD Vault\n(Spec-Driven)"}
        ];

        const links = [
            {x1: 210, y1: 150, x2: 270, y2: 150},
            {x1: 430, y1: 150, x2: 490, y2: 150},
            {x1: 650, y1: 150, x2: 710, y2: 150}
        ];

        svg.selectAll(".link")
            .data(links).enter().append("line")
            .attr("class", "link")
            .attr("x1", d => d.x1).attr("y1", d => d.y1)
            .attr("x2", d => d.x2).attr("y2", d => d.y2);

        const node = svg.selectAll(".node")
            .data(nodes).enter().append("g")
            .attr("class", "node")
            .attr("transform", d => `translate(${d.x},${d.y})`);

        node.append("rect")
            .attr("width", d => d.w).attr("height", d => d.h)
            .style("fill", d => d.fill).style("stroke", d => d.color);

        node.each(function(d) {
            const lines = d.label.split('\n');
            d3.select(this).append("text").attr("dx", d.w/2).attr("dy", d.h/2 - 5).text(lines[0]);
            if(lines.length > 1) {
                d3.select(this).append("text").attr("dx", d.w/2).attr("dy", d.h/2 + 15).style("fill", "#8b949e").style("font-size", "11px").text(lines[1]);
            }
        });
    </script>
</body>
</html>
