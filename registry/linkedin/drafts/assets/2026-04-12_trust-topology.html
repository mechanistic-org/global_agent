<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EN-OS Trust Relationship Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0d13; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
</head>
<body>
<!-- FIX 4: SVG height expanded 850 → 900 to prevent EXTERNAL THREAT clipping -->
<svg width="1280" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00c4d4"/>
    </marker>
    <marker id="arr-teal-sm" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#00c4d4"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arr-pink" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ec4899"/>
    </marker>
    <marker id="arr-red" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#ef4444"/>
    </marker>

    <!-- Dot grid -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.7" fill="#0d1120"/>
    </pattern>

    <!-- Glows -->
    <filter id="glow-teal" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-microvm" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="900" fill="#0a0d13"/>
  <rect width="1280" height="900" fill="url(#dots)"/>

  <!-- Title -->
  <text x="640" y="37" fill="#d1d5db" font-size="18" font-family="'Courier New', monospace"
        text-anchor="middle" letter-spacing="6" font-weight="bold">EN-OS  ·  TRUST RELATIONSHIP MAP</text>
  <text x="640" y="55" fill="#374151" font-size="11" font-family="'Courier New', monospace"
        text-anchor="middle" letter-spacing="3">attack topology  ·  not attack surface</text>

  <!-- HOST BOUNDARY (20,65) to (1240,665) -->
  <rect x="20" y="65" width="1220" height="600" rx="6"
        fill="#0b0f1a" stroke="#1a3a50" stroke-width="1.5" stroke-dasharray="12,5"/>
  <text x="40" y="84" fill="#1a3a50" font-size="10" font-family="'Courier New', monospace"
        letter-spacing="4">HOST  (system primitives)</text>

  <!-- MICRO VM BOUNDARY (45,100) to (295,625) — contains AGENT -->
  <rect x="45" y="100" width="250" height="525" rx="5"
        fill="#090e18" stroke="#00c4d4" stroke-width="1.5"
        filter="url(#glow-microvm)" opacity="0.95"/>
  <text x="170" y="118" fill="#00c4d4" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle" letter-spacing="4">microVM</text>
  <text x="170" y="132" fill="#0e4a56" font-size="9"
        font-family="'Courier New', monospace" text-anchor="middle">(isolated env)</text>
  <text x="170" y="618" fill="#0e3540" font-size="9"
        font-family="'Courier New', monospace" text-anchor="middle" letter-spacing="1">manifest-gated outbound</text>

  <!-- NODE: AGENT  center (170, 395), r=72 -->
  <circle cx="170" cy="395" r="72" fill="#0a1422" stroke="#00c4d4" stroke-width="2.5"
          filter="url(#glow-teal)"/>
  <text x="170" y="388" fill="#00c4d4" font-size="14"
        font-family="'Courier New', monospace" text-anchor="middle"
        font-weight="bold" letter-spacing="2">AGENT</text>
  <text x="170" y="407" fill="#0e5060" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle">(reasoning layer)</text>

  <!-- NODE: BROKER  center (615, 250), r=75 -->
  <circle cx="615" cy="250" r="75" fill="#14100a" stroke="#f59e0b" stroke-width="2.5"
          filter="url(#glow-amber)"/>
  <text x="615" y="243" fill="#f59e0b" font-size="14"
        font-family="'Courier New', monospace" text-anchor="middle"
        font-weight="bold" letter-spacing="2">BROKER</text>
  <!-- FIX 2: subtext color #0e3a44 → #2a7a8a (legible) -->
  <text x="615" y="263" fill="#2a7a8a" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle">(credential issuer)</text>

  <!-- NODE: ChromaDB  center (1060, 355), r=77 -->
  <circle cx="1060" cy="355" r="77" fill="#0a1222" stroke="#00c4d4" stroke-width="2.5"/>
  <text x="1060" y="348" fill="#e2e8f0" font-size="13"
        font-family="'Courier New', monospace" text-anchor="middle"
        font-weight="bold" letter-spacing="1">ChromaDB</text>
  <text x="1060" y="368" fill="#0e5060" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle">(vector store)</text>

  <!-- NODE: SECURITY CLAW  center (790, 548), r=54 -->
  <circle cx="790" cy="548" r="54" fill="#0e0810" stroke="#ef4444" stroke-width="2"
          filter="url(#glow-red)"/>
  <text x="790" y="541" fill="#ef4444" font-size="11"
        font-family="'Courier New', monospace" text-anchor="middle"
        font-weight="bold" letter-spacing="1">SECURITY</text>
  <text x="790" y="559" fill="#ef4444" font-size="11"
        font-family="'Courier New', monospace" text-anchor="middle"
        font-weight="bold" letter-spacing="1">CLAW</text>

  <!-- FIX 4: EXTERNAL THREAT shifted up: cy 765 → 748, text y values adjusted accordingly -->
  <!-- NODE: EXTERNAL THREAT  center (490, 748), r=67 — OUTSIDE HOST boundary -->
  <circle cx="490" cy="748" r="67" fill="#110812" stroke="#ec4899" stroke-width="2"
          filter="url(#glow-pink)"/>
  <text x="490" y="741" fill="#ec4899" font-size="13"
        font-family="'Courier New', monospace" text-anchor="middle"
        font-weight="bold" letter-spacing="1">EXTERNAL</text>
  <text x="490" y="761" fill="#ec4899" font-size="13"
        font-family="'Courier New', monospace" text-anchor="middle"
        font-weight="bold" letter-spacing="1">THREAT</text>

  <!-- EDGES -->

  <!-- HOST → BROKER: manages secrets -->
  <line x1="615" y1="92" x2="615" y2="175"
        stroke="#1a3a50" stroke-width="1.5" stroke-dasharray="4,3"
        marker-end="url(#arr-teal-sm)" opacity="0.55"/>
  <text x="632" y="133" fill="#1a3a50" font-size="9.5"
        font-family="'Courier New', monospace">manages secrets</text>

  <!-- AGENT → BROKER: requests token  (teal dashed) -->
  <path d="M 242,376 C 390,376 390,238 540,238"
        fill="none" stroke="#00c4d4" stroke-width="1.8"
        stroke-dasharray="6,3" marker-end="url(#arr-teal)" opacity="0.85"/>
  <text x="375" y="285" fill="#00c4d4" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle">requests token</text>

  <!-- BROKER → AGENT: issues short-lived token  (amber solid) -->
  <path d="M 540,263 C 388,263 388,412 242,412"
        fill="none" stroke="#f59e0b" stroke-width="2"
        marker-end="url(#arr-amber)" opacity="0.9"/>
  <text x="375" y="365" fill="#f59e0b" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle">issues short-lived token</text>

  <!-- AGENT → ChromaDB: reads / writes vectors  (teal solid) -->
  <path d="M 242,395 C 560,395 560,355 983,355"
        fill="none" stroke="#00c4d4" stroke-width="1.8"
        marker-end="url(#arr-teal)" opacity="0.85"/>
  <text x="610" y="380" fill="#9ca3af" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle">reads / writes vectors</text>
  <!-- FIX 3: poisoning label moved above the edge line (y 368 → 340) and shifted right to avoid overlap -->
  <text x="810" y="340" fill="#ec4899" font-size="9"
        font-family="'Courier New', monospace" text-anchor="middle" opacity="0.75">&#x26A0; poisoning via agent</text>

  <!-- SECURITY CLAW → AGENT  (red dashed monitoring) -->
  <path d="M 743,510 C 620,478 380,462 232,458"
        fill="none" stroke="#ef4444" stroke-width="1.2"
        stroke-dasharray="4,3" marker-end="url(#arr-red)" opacity="0.5"/>

  <!-- SECURITY CLAW → BROKER  (red dashed monitoring) -->
  <path d="M 760,496 C 740,420 700,360 680,325"
        fill="none" stroke="#ef4444" stroke-width="1.2"
        stroke-dasharray="4,3" marker-end="url(#arr-red)" opacity="0.5"/>

  <!-- SECURITY CLAW → ChromaDB  (red dashed monitoring) -->
  <path d="M 842,528 C 900,488 966,450 1018,428"
        fill="none" stroke="#ef4444" stroke-width="1.2"
        stroke-dasharray="4,3" marker-end="url(#arr-red)" opacity="0.5"/>

  <text x="790" y="498" fill="#ef4444" font-size="9"
        font-family="'Courier New', monospace" text-anchor="middle" opacity="0.6">monitors all</text>

  <!-- FIX 4: threat edge paths adjusted for new cy=748 origin -->
  <!-- EXTERNAL THREAT → AGENT: prompt injection  (pink dashed) -->
  <path d="M 453,683 C 385,638 240,557 186,467"
        fill="none" stroke="#ec4899" stroke-width="1.8"
        stroke-dasharray="6,3" marker-end="url(#arr-pink)" opacity="0.82"/>
  <text x="290" y="593" fill="#ec4899" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle">prompt injection</text>

  <!-- EXTERNAL THREAT → microVM: VM escape risk  (orange dashed) -->
  <path d="M 435,683 C 400,655 352,638 280,625"
        fill="none" stroke="#f97316" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arr-orange)" opacity="0.72"/>
  <text x="338" y="660" fill="#f97316" font-size="10"
        font-family="'Courier New', monospace" text-anchor="middle">VM escape risk</text>

  <!-- CALLOUT BOXES -->

  <!-- FIX 1: Callout A line now anchors to BROKER left edge (540, 263) instead of empty space -->
  <line x1="216" y1="232" x2="540" y2="263"
        stroke="#00c4d4" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <rect x="22" y="200" width="194" height="64" rx="2"
        fill="#05090f" stroke="#00c4d4" stroke-width="1" opacity="0.92"/>
  <text x="119" y="219" fill="#00c4d4" font-size="9.5"
        font-family="'Courier New', monospace" text-anchor="middle">Auth material isolated</text>
  <text x="119" y="233" fill="#00c4d4" font-size="9.5"
        font-family="'Courier New', monospace" text-anchor="middle">from reasoning layer</text>
  <!-- FIX 2: subtext color #0e3a44 → #2a7a8a -->
  <text x="119" y="252" fill="#2a7a8a" font-size="8.5"
        font-family="'Courier New', monospace" text-anchor="middle">BROKER holds secrets, not AGENT</text>

  <!-- Callout B: Single chokepoint — anchored to BROKER node right side -->
  <line x1="724" y1="163" x2="690" y2="210"
        stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <rect x="722" y="130" width="222" height="66" rx="2"
        fill="#0f0a04" stroke="#f59e0b" stroke-width="1" opacity="0.92"/>
  <text x="833" y="150" fill="#f59e0b" font-size="9.5"
        font-family="'Courier New', monospace" text-anchor="middle">Single chokepoint:</text>
  <text x="833" y="165" fill="#f59e0b" font-size="9.5"
        font-family="'Courier New', monospace" text-anchor="middle">no agent ever sees</text>
  <text x="833" y="180" fill="#f59e0b" font-size="9.5"
        font-family="'Courier New', monospace" text-anchor="middle">the raw secret</text>

  <!-- FIX 4: Callout C shifted up to match EXTERNAL THREAT new position -->
  <!-- Callout C: Not more doors — bottom-left, anchored to EXTERNAL THREAT -->
  <line x1="258" y1="751" x2="423" y2="751"
        stroke="#ec4899" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <rect x="22" y="721" width="234" height="72" rx="2"
        fill="#0e0510" stroke="#ec4899" stroke-width="1" opacity="0.92"/>
  <text x="139" y="741" fill="#ec4899" font-size="9.5"
        font-family="'Courier New', monospace" text-anchor="middle">Not more doors</text>
  <text x="139" y="756" fill="#ec4899" font-size="9.5"
        font-family="'Courier New', monospace" text-anchor="middle">on the same building.</text>
  <text x="139" y="771" fill="#ec4899" font-size="9.5"
        font-family="'Courier New', monospace" text-anchor="middle">A different building.</text>
  <text x="139" y="786" fill="#5c1a38" font-size="8.5"
        font-family="'Courier New', monospace" text-anchor="middle">attack topology, not attack surface</text>

  <!-- FIX 5: Legend — expanded box, orange relabeled "VM escape risk",
       red dashed entry added for "Security Claw monitoring" -->
  <rect x="618" y="690" width="640" height="160" rx="3"
        fill="#07090f" stroke="#1e293b" stroke-width="1" opacity="0.92"/>
  <text x="638" y="708" fill="#374151" font-size="9"
        font-family="'Courier New', monospace" letter-spacing="3">LEGEND</text>

  <!-- Teal solid -->
  <line x1="638" y1="723" x2="672" y2="723" stroke="#00c4d4" stroke-width="1.8"/>
  <polygon points="672,719 680,723 672,727" fill="#00c4d4"/>
  <text x="686" y="727" fill="#6b7280" font-size="9" font-family="'Courier New', monospace">Trust relationship (operational)</text>

  <!-- Teal dashed -->
  <line x1="638" y1="741" x2="672" y2="741" stroke="#00c4d4" stroke-width="1.5" stroke-dasharray="5,2"/>
  <polygon points="672,737 680,741 672,745" fill="#00c4d4"/>
  <text x="686" y="745" fill="#6b7280" font-size="9" font-family="'Courier New', monospace">Credential request (agent &#x2192; broker)</text>

  <!-- Amber solid -->
  <line x1="638" y1="759" x2="672" y2="759" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="672,755 680,759 672,763" fill="#f59e0b"/>
  <text x="686" y="763" fill="#6b7280" font-size="9" font-family="'Courier New', monospace">Token issuance (chokepoint)</text>

  <!-- Orange dashed — relabeled from "Attack topology risk" to "VM escape risk" -->
  <line x1="638" y1="777" x2="672" y2="777" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,2"/>
  <polygon points="672,773 680,777 672,781" fill="#f97316"/>
  <text x="686" y="781" fill="#6b7280" font-size="9" font-family="'Courier New', monospace">VM escape risk</text>

  <!-- Pink dashed -->
  <line x1="638" y1="795" x2="672" y2="795" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="5,2"/>
  <polygon points="672,791 680,795 672,799" fill="#ec4899"/>
  <text x="686" y="799" fill="#6b7280" font-size="9" font-family="'Courier New', monospace">External threat vector (prompt injection)</text>

  <!-- Red dashed — new entry for Security Claw monitoring -->
  <line x1="638" y1="813" x2="672" y2="813" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="672,809 680,813 672,817" fill="#ef4444"/>
  <text x="686" y="817" fill="#6b7280" font-size="9" font-family="'Courier New', monospace">Security Claw monitoring</text>

  <!-- FIX 4: Footer shifted down to y=888 to stay within new height -->
  <text x="640" y="888" fill="#1e293b" font-size="9"
        font-family="'Courier New', monospace" text-anchor="middle" letter-spacing="3">
    mechanistic  ·  EN-OS architecture
  </text>

</svg>
</body>
</html>
