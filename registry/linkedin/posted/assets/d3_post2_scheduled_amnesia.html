<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post 2: Scheduled Amnesia</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { fill: #161b22; stroke: #30363d; stroke-width: 2px; rx: 8; }
        .node rect { stroke-width: 2px; rx: 6; }
        .node text { font-size: 14px; fill: #ffffff; font-weight: bold; text-anchor: middle; font-family: monospace; }
        .node text.sub { font-size: 11px; fill: #8b949e; font-weight: normal; }
        .link { fill: none; stroke-width: 2px; }
        .link-poll { stroke: #8b949e; stroke-dasharray: 4,4; marker-end: url(#arrow-grey); }
        .link-webhook { stroke: #a371f7; stroke-width: 3px; marker-end: url(#arrow-purple); }
        .link-error { stroke: #f85149; stroke-width: 3px; marker-end: url(#arrow-red); }
    </style>
</head>
<body>
    <svg width="700" height="400">
        <defs>
            <marker id="arrow-grey" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,-5L10,0L0,5" fill="#8b949e" />
            </marker>
            <marker id="arrow-purple" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,-5L10,0L0,5" fill="#a371f7" />
            </marker>
            <marker id="arrow-red" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,-5L10,0L0,5" fill="#f85149" />
            </marker>
        </defs>
    </svg>
    <script>
        const svg = d3.select("svg");

        // Dividing lines / Titles
        svg.append("text").attr("x", 175).attr("y", 60).attr("fill", "#c9d1d9").attr("text-anchor", "middle").style("font-family", "monospace").style("font-weight", "bold").text("THE POLLING TRAP");
        svg.append("text").attr("x", 525).attr("y", 60).attr("fill", "#c9d1d9").attr("text-anchor", "middle").style("font-family", "monospace").style("font-weight", "bold").text("THE LIMIT SWITCH");
        svg.append("line").attr("x1", 350).attr("y1", 30).attr("x2", 350).attr("y2", 370).attr("stroke", "#30363d").attr("stroke-dasharray", "4,4");

        const nodes = [
            // Left Side: Polling
            {id: "Cron", x: 75, y: 120, w: 200, h: 45, color: "#d29922", fill: "#3b2a00", label: "[ CRON JOB: 5 MINS ]", sub: "Scheduled Amnesia"},
            {id: "Substrate1", x: 75, y: 280, w: 200, h: 45, color: "#3fb950", fill: "#194a20", label: "GitHub Substrate", sub: "Events missed in between"},
            
            // Right Side: Limit Switch
            {id: "Substrate2", x: 425, y: 120, w: 200, h: 45, color: "#3fb950", fill: "#194a20", label: "GitHub Substrate", sub: "Commit Pushed"},
            {id: "Webhook", x: 425, y: 200, w: 200, h: 45, color: "#a371f7", fill: "#3c1e70", label: "[ THE LIMIT SWITCH ]", sub: "Instant Webhook"},
            {id: "Router", x: 425, y: 280, w: 200, h: 45, color: "#58a6ff", fill: "#1f3a5f", label: "FastAPI / NanoClaw", sub: "Agent Awakes"}
        ];

        // Links
        svg.append("path").attr("d", "M 175 165 C 195 220, 195 220, 175 280").attr("class", "link link-poll").attr("fill", "none");
        svg.append("path").attr("d", "M 175 280 C 155 220, 155 220, 175 165").attr("class", "link link-poll").attr("fill", "none");
        
        svg.append("text").attr("x", 115).attr("y", 225).attr("fill", "#8b949e").attr("text-anchor", "end").style("font-family", "monospace").style("font-size", "11px").text("Missed Event");
        svg.append("circle").attr("cx", 175).attr("cy", 222).attr("r", 6).attr("fill", "#ff7b72");

        const linksRight = [
            {x1: 525, y1: 165, x2: 525, y2: 200, class: "link-webhook"},
            {x1: 525, y1: 245, x2: 525, y2: 280, class: "link-webhook"}
        ];

        svg.selectAll(".linkR")
            .data(linksRight)
            .enter().append("line")
            .attr("class", d => d.class ? `link ${d.class}` : "link")
            .attr("x1", d => d.x1).attr("y1", d => d.y1)
            .attr("x2", d => d.x2).attr("y2", d => d.y2);

        const node = svg.selectAll(".node")
            .data(nodes)
            .enter().append("g")
            .attr("class", "node")
            .attr("transform", d => `translate(${d.x},${d.y})`);

        node.append("rect")
            .attr("width", d => d.w)
            .attr("height", d => d.h)
            .style("fill", d => d.fill)
            .style("stroke", d => d.color);

        node.append("text")
            .attr("dx", d => d.w / 2)
            .attr("dy", d => d.h / 2)
            .text(d => d.label);
            
        node.append("text")
            .attr("class", "sub")
            .attr("dx", d => d.w / 2)
            .attr("dy", d => d.h / 2 + 16)
            .text(d => d.sub);
    </script>
</body>
</html>
